<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In</title>
  <style>
    :root{
      --bg: #0b1220;
      --card: #111a2e;
      --text: #e9eefc;
      --muted: #a9b4d0;
      --border: rgba(255,255,255,.12);
      --accent: #4f8cff;
      --danger: #ff5a7a;
      --success: #2ee59d;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 14px;
      --pad: 18px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(79,140,255,.20), transparent 60%),
                  radial-gradient(900px 500px at 80% 30%, rgba(46,229,157,.12), transparent 55%),
                  var(--bg);
      color: var(--text);
    }
    .wrap{
      width: min(420px, 92vw);
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
    }
    .title{
      font-size: 1.35rem;
      margin: 0 0 6px 0;
      letter-spacing: .2px;
    }
    .subtitle{
      margin: 0 0 18px 0;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.4;
    }
    label{
      display:block;
      font-size: .86rem;
      color: var(--muted);
      margin: 14px 0 6px;
    }
    input{
      width: 100%;
      box-sizing:border-box;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline: none;
    }
    input:focus{
      border-color: rgba(79,140,255,.65);
      box-shadow: 0 0 0 3px rgba(79,140,255,.18);
    }
    .row{
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content:space-between;
      margin-top: 14px;
    }
    button{
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(79,140,255,1), rgba(79,140,255,.78));
      color: white;
      font-weight: 700;
      cursor:pointer;
      transition: transform .05s ease;
    }
    button:active{ transform: translateY(1px); }
    .msg{
      margin-top: 14px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.18);
      font-size: .92rem;
    }
    .msg.success{ border-color: rgba(46,229,157,.35); }
    .msg.error{ border-color: rgba(255,90,122,.35); }
    .footer{
      margin-top: 14px;
      color: var(--muted);
      font-size: .82rem;
      text-align:center;
    }
    .pill{
      display:inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.05);
      font-size: .78rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="pill">Local Demo • Capstone</div>
      <h1 class="title">Sign in</h1>
      <p class="subtitle">
        Enter your credentials to start a session. Suspicious behavior will later be redirected to a decoy environment.
      </p>

      <form method="POST" autocomplete="off">
        <label for="username">Username</label>
        <input id="username" name="username" placeholder="e.g., admin" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />

        <div class="row">
          <button type="submit">Login</button>
        </div>
      </form>

      {% if message %}
        <div class="msg {{ msg_type }}">
          {{ message }}
        </div>
      {% endif %}

      <div class="footer">
        Tip: You can run this locally at <strong>127.0.0.1:5000</strong>
      </div>
    </div>
  </div>
</body>
</html>
